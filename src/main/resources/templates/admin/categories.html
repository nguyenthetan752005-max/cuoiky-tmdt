<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục - Admin GOOD MINTON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark, #0b0c10);
            color: var(--text-white, #ffffff);
            min-height: 100vh;
        }

        /* ── Main content area ── */
        .admin-content {
            margin-left: 260px;
            padding-top: 70px;
            min-height: 100vh;
        }

        .admin-content__inner {
            padding: 32px;
        }

        /* ── Flash messages ── */
        .flash-message {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: flashSlideIn 0.4s ease;
        }

        @keyframes flashSlideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .flash-message--success {
            background: rgba(32, 247, 123, 0.1);
            border: 1px solid rgba(32, 247, 123, 0.25);
            color: var(--accent, #20f77b);
        }

        .flash-message--error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.25);
            color: #ff5252;
        }

        /* ── Section header ── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .section-header__bar {
            width: 4px;
            height: 22px;
            background: linear-gradient(180deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            border-radius: 2px;
        }

        .section-header__title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        /* ── Form card ── */
        .form-card {
            background: rgba(31, 40, 51, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(69, 243, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
        }

        .form-card__title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-white, #ffffff);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-card__title i {
            color: var(--primary, #45f3ff);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group--full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-gray, #c5c6c7);
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(11, 12, 16, 0.6);
            border: 1px solid rgba(69, 243, 255, 0.12);
            border-radius: 10px;
            color: var(--text-white, #ffffff);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(197, 198, 199, 0.35);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary, #45f3ff);
            box-shadow: 0 0 0 3px rgba(69, 243, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .btn--primary {
            background: linear-gradient(135deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            color: var(--bg-dark, #0b0c10);
            box-shadow: 0 4px 15px rgba(69, 243, 255, 0.25);
        }

        .btn--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(69, 243, 255, 0.35);
        }

        .btn--ghost {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-gray, #c5c6c7);
        }

        .btn--ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-white, #ffffff);
        }

        /* ── Table card ── */
        .table-card {
            background: rgba(31, 40, 51, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(69, 243, 255, 0.08);
            border-radius: 16px;
            overflow-x: auto;
        }

        .table-card__header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(69, 243, 255, 0.08);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table thead th {
            padding: 14px 20px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-gray, #c5c6c7);
            background: rgba(11, 12, 16, 0.3);
            border-bottom: 1px solid rgba(69, 243, 255, 0.06);
        }

        .admin-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s ease;
        }

        .admin-table tbody tr:hover {
            background: rgba(69, 243, 255, 0.04);
        }

        .admin-table tbody tr:last-child {
            border-bottom: none;
        }

        .admin-table tbody td {
            padding: 14px 20px;
            font-size: 0.9rem;
            color: var(--text-gray, #c5c6c7);
        }

        .admin-table .cat-id {
            font-weight: 600;
            color: var(--primary, #45f3ff);
            font-size: 0.85rem;
        }

        .admin-table .cat-name {
            color: var(--text-white, #ffffff);
            font-weight: 500;
        }

        .admin-table .cat-desc {
            max-width: 350px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Action buttons ── */
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .btn-action--edit {
            background: rgba(69, 243, 255, 0.1);
            color: var(--primary, #45f3ff);
            border: 1px solid rgba(69, 243, 255, 0.2);
        }

        .btn-action--edit:hover {
            background: rgba(69, 243, 255, 0.2);
            box-shadow: 0 0 12px rgba(69, 243, 255, 0.15);
        }

        .btn-action--delete {
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border: 1px solid rgba(255, 82, 82, 0.2);
        }

        .btn-action--delete:hover {
            background: rgba(255, 82, 82, 0.2);
            box-shadow: 0 0 12px rgba(255, 82, 82, 0.15);
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-gray, #c5c6c7);
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <!-- Topbar -->
    <div th:replace="~{admin/layout :: topbar('Quản lý Danh mục')}"></div>

    <!-- Main content -->
    <main class="admin-content">
        <div class="admin-content__inner">

            <!-- ── Flash messages ── -->
            <div th:if="${success}" class="flash-message flash-message--success">
                <i class="fas fa-circle-check"></i>
                <span th:text="${success}">Thao tác thành công!</span>
            </div>

            <div th:if="${error}" class="flash-message flash-message--error">
                <i class="fas fa-circle-exclamation"></i>
                <span th:text="${error}">Có lỗi xảy ra!</span>
            </div>

            <!-- ── Add / Edit Category Form ── -->
            <div class="form-card">
                <div class="form-card__title" id="formTitle">
                    <i class="fas fa-plus-circle"></i>
                    <span id="formTitleText">Thêm danh mục mới</span>
                </div>

                <form id="categoryForm" th:action="@{/admin/categories/save}" method="post">
                    <input type="hidden" id="categoryId" name="id" value="">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoryName">Tên danh mục <span style="color: #ff5252;">*</span></label>
                            <input type="text" id="categoryName" name="name" placeholder="Nhập tên danh mục" required>
                        </div>
                        <div class="form-group">
                            <label for="categoryDesc">Mô tả</label>
                            <textarea id="categoryDesc" name="description" placeholder="Nhập mô tả danh mục"></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn--primary">
                            <i class="fas fa-save"></i>
                            <span id="submitBtnText">Lưu danh mục</span>
                        </button>
                        <button type="button" class="btn btn--ghost" id="cancelEditBtn" style="display: none;" onclick="resetForm()">
                            <i class="fas fa-times"></i>
                            Hủy
                        </button>
                    </div>
                </form>
            </div>

            <!-- ── Categories table ── -->
            <div class="table-card">
                <div class="table-card__header">
                    <div class="section-header" style="margin-bottom: 0;">
                        <div class="section-header__bar"></div>
                        <h2 class="section-header__title">Danh sách danh mục (<span th:text="${categories.size()}"></span>)</h2>
                    </div>
                </div>

                <div th:if="${categories != null and !categories.isEmpty()}">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên danh mục</th>
                                <th>Mô tả</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categories}">
                                <td class="cat-id" th:text="${cat.id}">#1</td>
                                <td class="cat-name" th:text="${cat.name}">Vợt cầu lông</td>
                                <td class="cat-desc" th:text="${cat.description}">Mô tả danh mục</td>
                                <td>
                                    <div class="action-buttons">
                                        <button type="button" class="btn-action btn-action--edit"
                                                th:onclick="|editCategory('${cat.id}', '${cat.name}', '${cat.description}')|">
                                            <i class="fas fa-pen-to-square"></i>
                                            Sửa
                                        </button>
                                        <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                           class="btn-action btn-action--delete"
                                           onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                                            <i class="fas fa-trash-can"></i>
                                            Xóa
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Empty state -->
                <div th:if="${categories == null or categories.isEmpty()}" class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>Chưa có danh mục nào. Hãy thêm danh mục mới!</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        /**
         * Populate the form with category data for editing
         */
        function editCategory(id, name, description) {
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryDesc').value = description || '';
            document.getElementById('formTitleText').textContent = 'Chỉnh sửa danh mục';
            document.getElementById('submitBtnText').textContent = 'Cập nhật';
            document.getElementById('cancelEditBtn').style.display = 'inline-flex';

            // Update form title icon
            const titleIcon = document.querySelector('#formTitle i');
            titleIcon.className = 'fas fa-pen-to-square';

            // Scroll to form
            document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        /**
         * Reset form back to "Add" mode
         */
        function resetForm() {
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDesc').value = '';
            document.getElementById('formTitleText').textContent = 'Thêm danh mục mới';
            document.getElementById('submitBtnText').textContent = 'Lưu danh mục';
            document.getElementById('cancelEditBtn').style.display = 'none';

            // Reset form title icon
            const titleIcon = document.querySelector('#formTitle i');
            titleIcon.className = 'fas fa-plus-circle';
        }

        // Auto-hide flash messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function () {
            const flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(function (msg) {
                setTimeout(function () {
                    msg.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    msg.style.opacity = '0';
                    msg.style.transform = 'translateY(-10px)';
                    setTimeout(function () {
                        msg.remove();
                    }, 400);
                }, 5000);
            });
        });
    </script>
</body>
</html>
