<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Goodminton Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark, #0b0c10);
            color: var(--text-white, #ffffff);
            min-height: 100vh;
        }

        .admin-content {
            margin-left: 250px;
            padding: 80px 30px 30px 30px;
            min-height: 100vh;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 9px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(31, 40, 51, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-gray, #c5c6c7);
            backdrop-filter: blur(10px);
        }
        .filter-tab:hover {
            background: rgba(69, 243, 255, 0.08);
            border-color: rgba(69, 243, 255, 0.2);
            color: var(--primary, #45f3ff);
        }
        .filter-tab.active {
            background: rgba(69, 243, 255, 0.15);
            border-color: var(--primary, #45f3ff);
            color: var(--primary, #45f3ff);
            box-shadow: 0 0 12px rgba(69, 243, 255, 0.15);
        }

        /* Table Card */
        .table-card {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(69, 243, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary, #45f3ff);
            background: rgba(69, 243, 255, 0.06);
            border-bottom: 1px solid rgba(69, 243, 255, 0.15);
            white-space: nowrap;
        }
        .admin-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s ease;
        }
        .admin-table tbody tr:hover {
            background: rgba(69, 243, 255, 0.04);
        }
        .admin-table tbody tr:last-child {
            border-bottom: none;
        }
        .admin-table tbody td {
            padding: 12px 16px;
            font-size: 0.88rem;
            color: var(--text-gray, #c5c6c7);
            vertical-align: middle;
        }

        /* Order code */
        .order-code {
            font-weight: 600;
            color: var(--text-white, #fff);
            font-family: 'Inter', monospace;
            white-space: nowrap;
        }

        /* Price */
        .price-text {
            color: var(--accent, #20f77b);
            font-weight: 600;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .status-PENDING {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.35);
            color: #ffc107;
        }
        .status-SHIPPING {
            background: rgba(69, 165, 255, 0.15);
            border: 1px solid rgba(69, 165, 255, 0.35);
            color: #45a5ff;
        }
        .status-DELIVERED {
            background: rgba(32, 247, 123, 0.15);
            border: 1px solid rgba(32, 247, 123, 0.35);
            color: #20f77b;
        }
        .status-CANCELLED {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.35);
            color: #ff4444;
        }

        /* Action link */
        .btn-detail {
            display: inline-block;
            white-space: nowrap;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(69, 243, 255, 0.12);
            border: 1px solid rgba(69, 243, 255, 0.3);
            color: var(--primary, #45f3ff);
        }
        .btn-detail:hover {
            background: rgba(69, 243, 255, 0.25);
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray, #c5c6c7);
        }
        .empty-state p {
            font-size: 1rem;
        }

        /* Date text */
        .date-text {
            font-size: 0.82rem;
            color: rgba(197, 198, 199, 0.7);
            white-space: nowrap;
        }
    </style>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* SweetAlert Dark Theme Tweaks to match Goodminton */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #1a222c !important;
            color: #ffffff !important;
            border: 1px solid rgba(69, 243, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm {
            background: #45f3ff !important;
            color: #1a1a2e !important;
            font-weight: 600;
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-cancel {
            background: rgba(255,255,255,0.1) !important;
            color: #fff !important;
        }
    </style>

</head>
<body>

<!-- Sidebar -->
<div th:replace="~{admin/layout :: sidebar(currentPage='orders')}"></div>

<!-- Topbar -->
<div th:replace="~{admin/layout :: topbar(pageTitle='Quản Lý Đơn Hàng')}"></div>

<!-- Main Content -->
<div class="admin-content">

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <a th:href="@{/admin/orders}"
           class="filter-tab"
           th:classappend="${selectedStatus == null or selectedStatus == ''} ? 'active' : ''">
            Tất cả
        </a>
        <a th:href="@{/admin/orders(status='PENDING')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'PENDING'} ? 'active' : ''">
            ⏳ Chờ xử lý
        </a>
        <a th:href="@{/admin/orders(status='SHIPPING')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'SHIPPING'} ? 'active' : ''">
            🚚 Đang giao
        </a>
        <a th:href="@{/admin/orders(status='DELIVERED')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'DELIVERED'} ? 'active' : ''">
            ✅ Đã giao
        </a>
        <a th:href="@{/admin/orders(status='CANCELLED')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'CANCELLED'} ? 'active' : ''">
            ❌ Đã hủy
        </a>
    </div>

    <!-- Orders Table -->
    <div class="table-card">
        <table class="admin-table" th:if="${orders != null and !orders.isEmpty()}">
            <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>SĐT</th>
                    <th>Tổng tiền</th>
                    <th>Phương thức TT</th>
                    <th>Trạng thái</th>
                    <th>Ngày đặt</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td>
                        <span class="order-code" th:text="${order.orderCode}">ORD001</span>
                    </td>
                    <td th:text="${order.customerName}">Nguyễn Văn A</td>
                    <td th:text="${order.phoneNumber}">0901234567</td>
                    <td class="price-text">
                        <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </td>
                    <td th:text="${order.paymentMethod}">COD</td>
                    <td>
                        <span class="status-badge"
                              th:classappend="'status-' + ${order.status}"
                              th:text="${order.status}">PENDING</span>
                    </td>
                    <td>
                        <span class="date-text" th:text="${#dates.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn-detail">Xem chi tiết</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Empty State -->
        <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
            <p>Không tìm thấy đơn hàng nào.</p>
        </div>
    </div>
</div>


    <!-- Global SweetAlert wrappers -->
    <script>
        function confirmLink(e, element, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = element.href;
                }
            });
        }

        function confirmForm(e, form, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        }
        
        // Override standard alert to use SweetAlert
        window.originalAlert = window.alert;
        window.alert = function(msg) {
            Swal.fire({
                title: 'Thông báo',
                text: msg,
                icon: msg.toLowerCase().includes('lỗi') || msg.toLowerCase().includes('trống') ? 'error' : 'info',
                confirmButtonText: 'OK'
            });
        };
    </script>

</body>
</html>
