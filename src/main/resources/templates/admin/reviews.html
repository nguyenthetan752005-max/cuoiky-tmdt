<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Duyệt Đánh Giá - Goodminton Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark, #0b0c10);
            color: var(--text-white, #ffffff);
            min-height: 100vh;
        }

        .admin-content {
            margin-left: 250px;
            padding: 80px 30px 30px 30px;
            min-height: 100vh;
        }

        .table-card {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(69, 243, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary, #45f3ff);
            background: rgba(69, 243, 255, 0.06);
            border-bottom: 1px solid rgba(69, 243, 255, 0.15);
            white-space: nowrap;
        }
        .admin-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s ease;
        }
        .admin-table tbody tr:hover {
            background: rgba(69, 243, 255, 0.04);
        }
        .admin-table tbody tr:last-child { border-bottom: none; }
        .admin-table tbody td {
            padding: 12px 16px;
            font-size: 0.88rem;
            color: var(--text-gray, #c5c6c7);
            vertical-align: middle;
        }

        .stars { color: #ffc107; }
        .content-cell {
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .votes-up { color: var(--accent, #20f77b); font-weight: 600; }
        .votes-down { color: #ff4444; font-weight: 600; }

        .btn-delete {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
        .btn-delete:hover {
            background: rgba(255, 68, 68, 0.25);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray, #c5c6c7);
        }

        /* Alert messages */
        .alert {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .alert-success {
            background: rgba(32, 247, 123, 0.12);
            border: 1px solid rgba(32, 247, 123, 0.3);
            color: #20f77b;
        }
        .alert-error {
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
    </style>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* SweetAlert Dark Theme Tweaks to match Goodminton */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #1a222c !important;
            color: #ffffff !important;
            border: 1px solid rgba(69, 243, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm {
            background: #45f3ff !important;
            color: #1a1a2e !important;
            font-weight: 600;
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-cancel {
            background: rgba(255,255,255,0.1) !important;
            color: #fff !important;
        }
    </style>

</head>
<body>

<!-- Sidebar -->
<div th:replace="~{admin/layout :: sidebar(currentPage='reviews')}"></div>

<!-- Topbar -->
<div th:replace="~{admin/layout :: topbar(pageTitle='Kiểm Duyệt Đánh Giá')}"></div>

<!-- Main Content -->
<div class="admin-content">

    <!-- Flash messages -->
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- Filter Form -->
    <form th:action="@{/admin/reviews}" method="get" style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center;">
        <select name="rating" style="padding: 10px 14px; border-radius: 8px; background: rgba(31,40,51,0.6); color: #fff; border: 1px solid rgba(69,243,255,0.2); width: 200px; font-family: inherit;">
            <option value="">Tất cả số sao</option>
            <option value="5" th:selected="${selectedRating == 5}">⭐⭐⭐⭐⭐ (5 Sao)</option>
            <option value="4" th:selected="${selectedRating == 4}">⭐⭐⭐⭐ (4 Sao)</option>
            <option value="3" th:selected="${selectedRating == 3}">⭐⭐⭐ (3 Sao)</option>
            <option value="2" th:selected="${selectedRating == 2}">⭐⭐ (2 Sao)</option>
            <option value="1" th:selected="${selectedRating == 1}">⭐ (1 Sao)</option>
        </select>
        <button type="submit" style="padding: 10px 18px; border-radius: 8px; background: rgba(69,243,255,0.1); border: 1px solid var(--primary); color: var(--primary); cursor: pointer; font-weight: 600; transition: all 0.3s;">
            <i class="fa-solid fa-filter" style="margin-right: 5px;"></i> Lọc
        </button>
        <a th:if="${selectedRating != null and selectedRating != ''}" th:href="@{/admin/reviews}" 
           style="padding: 10px 18px; border-radius: 8px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff4444; text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: all 0.3s;">
           Xóa lọc
        </a>
    </form>

    <!-- Reviews Table -->
    <div class="table-card">
        <table class="admin-table" th:if="${reviews != null and !reviews.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Sản phẩm</th>
                    <th>Người đánh giá</th>
                    <th>Sao</th>
                    <th>Nội dung</th>
                    <th>Phản hồi của Shop</th>
                    <th>👍 / 👎</th>
                    <th>Ngày</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${reviews}">
                    <td th:text="${r.id}">1</td>
                    <td th:text="${r.product != null ? r.product.name : 'N/A'}">Sản phẩm</td>
                    <td th:text="${r.customerName}">Tên</td>
                    <td>
                        <span class="stars">
                            <i th:each="i : ${#numbers.sequence(1, r.rating)}" class="fa-solid fa-star"></i>
                            <i th:each="i : ${#numbers.sequence(r.rating + 1, 5)}" class="fa-regular fa-star" style="opacity: 0.3;"></i>
                        </span>
                    </td>
                    <td class="content-cell" th:text="${r.content}">Nội dung đánh giá</td>
                    <td>
                        <form th:action="@{/admin/reviews/reply/{id}(id=${r.id})}" method="post" style="display:flex; flex-direction:column; gap: 6px;">
                            <textarea name="adminReply" th:text="${r.adminReply}" placeholder="Nhập phản hồi..." rows="2" style="padding:6px; border-radius:6px; border:1px solid rgba(69,243,255,0.2); background:rgba(0,0,0,0.3); color:#fff; width:180px; font-family:inherit; font-size:0.8rem; resize:vertical;"></textarea>
                            <button type="submit" style="padding:4px 10px; border-radius:6px; cursor:pointer; background:rgba(69,243,255,0.1); color:var(--primary); border:1px solid var(--primary); font-size:0.75rem; align-self:flex-start; transition:all 0.3s;">Phản hồi</button>
                        </form>
                    </td>
                    <td>
                        <span class="votes-up" th:text="${r.upvotes}">0</span> /
                        <span class="votes-down" th:text="${r.downvotes}">0</span>
                    </td>
                    <td style="font-size: 0.82rem; color: rgba(197,198,199,0.7); white-space: nowrap;"
                        th:text="${r.createdAt != null ? #dates.format(r.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A'}">01/01/2026</td>
                    <td>
                        <form th:action="@{/admin/reviews/delete/{id}(id=${r.id})}" method="post"
                              style="display:inline;" onsubmit="return confirm('Xác nhận xóa đánh giá này? Điểm trung bình sản phẩm sẽ được tính lại.');">
                            <button type="submit" class="btn-delete">
                                <i class="fa-solid fa-trash"></i> Xóa
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Empty State -->
        <div th:if="${reviews == null or reviews.isEmpty()}" class="empty-state">
            <p>Chưa có đánh giá nào từ khách hàng.</p>
        </div>
    </div>
</div>


    <!-- Global SweetAlert wrappers -->
    <script>
        function confirmLink(e, element, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = element.href;
                }
            });
        }

        function confirmForm(e, form, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        }
        
        // Override standard alert to use SweetAlert
        window.originalAlert = window.alert;
        window.alert = function(msg) {
            Swal.fire({
                title: 'Thông báo',
                text: msg,
                icon: msg.toLowerCase().includes('lỗi') || msg.toLowerCase().includes('trống') ? 'error' : 'info',
                confirmButtonText: 'OK'
            });
        };
    </script>

</body>
</html>
