<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Layout Fragments</title>
</head>
<body>

<!-- ==================== SIDEBAR FRAGMENT ==================== -->
<nav th:fragment="sidebar" class="admin-sidebar">
    <style>
        /* ── Sidebar ── */
        .admin-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(31, 40, 51, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(69, 243, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
        }

        /* Logo section */
        .sidebar-logo {
            padding: 28px 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(69, 243, 255, 0.08);
        }

        .sidebar-logo__brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-logo__subtitle {
            font-size: 0.72rem;
            color: var(--text-gray, #c5c6c7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Navigation */
        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-nav__link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 18px;
            border-radius: 12px;
            color: var(--text-gray, #c5c6c7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s ease;
            position: relative;
        }

        .sidebar-nav__link i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
            transition: color 0.25s ease;
        }

        .sidebar-nav__link:hover {
            background: rgba(69, 243, 255, 0.08);
            color: var(--text-white, #ffffff);
        }

        .sidebar-nav__link:hover i {
            color: var(--primary, #45f3ff);
        }

        .sidebar-nav__link--active {
            background: rgba(69, 243, 255, 0.12);
            color: var(--primary, #45f3ff);
            font-weight: 600;
        }

        .sidebar-nav__link--active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: linear-gradient(180deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            border-radius: 0 3px 3px 0;
        }

        .sidebar-nav__link--active i {
            color: var(--primary, #45f3ff);
        }

        .sidebar-separator {
            height: 1px;
            background: rgba(69, 243, 255, 0.08);
            margin: 10px 18px;
        }

        .sidebar-nav__link--danger:hover {
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
        }

        .sidebar-nav__link--danger:hover i {
            color: #ff5252;
        }
    </style>

    <!-- Logo -->
    <div class="sidebar-logo">
        <div class="sidebar-logo__brand">GOOD MINTON</div>
        <div class="sidebar-logo__subtitle">Admin Panel</div>
    </div>

    <!-- Navigation links -->
    <div class="sidebar-nav">
        <a th:href="@{/admin}" class="sidebar-nav__link"
           th:classappend="${currentPage == 'dashboard'} ? 'sidebar-nav__link--active'">
            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>
        </a>
        <a th:href="@{/admin/categories}" class="sidebar-nav__link"
           th:classappend="${currentPage == 'categories'} ? 'sidebar-nav__link--active'">
            <i class="fas fa-layer-group"></i>
            <span>Danh mục</span>
        </a>
        <a th:href="@{/admin/products}" class="sidebar-nav__link"
           th:classappend="${currentPage == 'products'} ? 'sidebar-nav__link--active'">
            <i class="fas fa-box-open"></i>
            <span>Sản phẩm</span>
        </a>
        <a th:href="@{/admin/orders}" class="sidebar-nav__link"
           th:classappend="${currentPage == 'orders'} ? 'sidebar-nav__link--active'">
            <i class="fas fa-clipboard-list"></i>
            <span>Đơn hàng</span>
        </a>
        <a th:href="@{/admin/reviews}" class="sidebar-nav__link"
           th:classappend="${currentPage == 'reviews'} ? 'sidebar-nav__link--active'">
            <i class="fas fa-star"></i>
            <span>Đánh giá</span>
        </a>
        <a th:href="@{/admin/returns}" class="sidebar-nav__link"
           th:classappend="${currentPage == 'returns'} ? 'sidebar-nav__link--active'">
            <i class="fas fa-rotate-left"></i>
            <span>Đổi/Trả hàng</span>
        </a>

        <div class="sidebar-separator"></div>

        <a th:href="@{/}" class="sidebar-nav__link">
            <i class="fas fa-store"></i>
            <span>Về Trang Chủ</span>
        </a>
        <a th:href="@{/admin/logout}" class="sidebar-nav__link sidebar-nav__link--danger">
            <i class="fas fa-right-from-bracket"></i>
            <span>Đăng xuất</span>
        </a>
    </div>
</nav>


<!-- ==================== TOPBAR FRAGMENT ==================== -->
<header th:fragment="topbar(pageTitle)" class="admin-topbar">
    <style>
        /* ── Topbar ── */
        .admin-topbar {
            position: fixed;
            top: 0;
            left: 260px;
            right: 0;
            height: 70px;
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(69, 243, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 999;
        }

        .topbar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-white, #ffffff);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: linear-gradient(180deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            border-radius: 2px;
        }

        .topbar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-gray, #c5c6c7);
            font-size: 0.9rem;
        }

        .topbar-user__avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-dark, #0b0c10);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .topbar-user__name {
            color: var(--text-white, #ffffff);
            font-weight: 600;
        }
    </style>

    <div class="topbar-title" th:text="${pageTitle}">Page Title</div>

    <div class="topbar-user">
        <span>Xin chào,</span>
        <span class="topbar-user__name" th:text="${session.adminUser != null ? session.adminUser.username : 'Admin'}">Admin</span>
        <div class="topbar-user__avatar">
            <i class="fas fa-user-shield"></i>
        </div>
    </div>
</header>

</body>
</html>
