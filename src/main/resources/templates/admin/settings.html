<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài Đặt Hệ Thống - Goodminton Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark, #0b0c10); color: var(--text-white, #ffffff); min-height: 100vh; }
        .admin-content { margin-left: 250px; padding: 80px 30px 30px 30px; min-height: 100vh; }
        
        .form-card { background: rgba(31, 40, 51, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(69, 243, 255, 0.1); border-radius: 16px; padding: 30px; max-width: 600px; margin: 0 auto; }
        .form-title { font-size: 1.4rem; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; border-bottom: 1px solid rgba(69,243,255,0.2); padding-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 0.95rem; font-weight: 500; }
        .input-group { display: flex; align-items: center; background: rgba(11, 12, 16, 0.6); border: 1px solid rgba(69, 243, 255, 0.15); border-radius: 8px; overflow: hidden; }
        .input-group input { flex: 1; padding: 12px 15px; background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1rem; outline: none; }
        .input-group span { padding: 12px 15px; background: rgba(69, 243, 255, 0.1); color: var(--primary); font-weight: bold; border-left: 1px solid rgba(69, 243, 255, 0.15); }
        .input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 10px rgba(69, 243, 255, 0.2); }
        
        .btn-submit { padding: 12px 30px; background: linear-gradient(135deg, rgba(69,243,255,0.2), rgba(32,247,123,0.2)); border: 1px solid var(--primary); color: var(--primary); border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-submit:hover { background: linear-gradient(135deg, rgba(69,243,255,0.3), rgba(32,247,123,0.3)); box-shadow: 0 0 15px rgba(69,243,255,0.4); }

        .flash-message { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: 500; max-width: 600px; margin-left: auto; margin-right: auto; }
        .flash-success { background: rgba(32, 247, 123, 0.15); border: 1px solid #20f77b; color: #20f77b; }
        .flash-error { background: rgba(255, 68, 68, 0.15); border: 1px solid #ff4444; color: #ff4444; }
    </style>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* SweetAlert Dark Theme Tweaks to match Goodminton */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #1a222c !important;
            color: #ffffff !important;
            border: 1px solid rgba(69, 243, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm {
            background: #45f3ff !important;
            color: #1a1a2e !important;
            font-weight: 600;
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-cancel {
            background: rgba(255,255,255,0.1) !important;
            color: #fff !important;
        }
    </style>

</head>
<body>
<div th:replace="~{admin/layout :: sidebar(currentPage='settings')}"></div>
<div th:replace="~{admin/layout :: topbar(pageTitle='Cài Đặt Hệ Thống')}"></div>

<div class="admin-content">
    <div th:if="${success}" class="flash-message flash-success" th:text="${success}"></div>
    <div th:if="${error}" class="flash-message flash-error" th:text="${error}"></div>

    <form th:action="@{/admin/settings/save}" method="post" style="display: flex; flex-direction: column; gap: 30px;">
        <!-- CẤU HÌNH CỬA HÀNG -->
        <div class="form-card" style="margin: 0; max-width: 100%;">
            <h2 class="form-title"><i class="fa-solid fa-store"></i> Thông Tin Cửa Hàng</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Tên cửa hàng</label>
                    <div class="input-group">
                        <input type="text" name="storeName" th:value="${config.storeName}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Hotline liên hệ</label>
                    <div class="input-group">
                        <input type="text" name="hotline" th:value="${config.hotline}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email hỗ trợ</label>
                    <div class="input-group">
                        <input type="email" name="contactEmail" th:value="${config.contactEmail}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Địa chỉ cửa hàng</label>
                    <div class="input-group">
                        <input type="text" name="storeAddress" th:value="${config.storeAddress}" required>
                    </div>
                </div>
            </div>
        </div>

        <!-- CẤU HÌNH VẬN CHUYỂN -->
        <div class="form-card" style="margin: 0; max-width: 100%;">
            <h2 class="form-title"><i class="fa-solid fa-truck-fast"></i> Cấu Hình Vận Chuyển</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Phí Vận Chuyển Toàn Quốc</label>
                    <div class="input-group">
                        <input type="number" name="baseShippingFee" th:value="${config.baseShippingFee}" required min="0">
                        <span>VNĐ</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Ngưỡng Miễn Phí Vận Chuyển (Freeship)</label>
                    <div class="input-group">
                        <input type="number" name="freeshipThreshold" th:value="${config.freeshipThreshold}" required min="0">
                        <span>VNĐ</span>
                    </div>
                    <small style="color: var(--text-gray); margin-top: 5px; display: block;">Đơn hàng có tổng giá trị lớn hơn hoặc bằng mức này sẽ được Freeship.</small>
                </div>
            </div>
        </div>

        <!-- CẤU HÌNH THÔNG BÁO -->
        <div class="form-card" style="margin: 0; max-width: 100%;">
            <h2 class="form-title"><i class="fa-solid fa-bullhorn"></i> Thông Báo Toàn Trang (Global)</h2>
            <div class="form-group">
                <label>Nội dung thông báo (Hiển thị chạy ngang trên cùng website)</label>
                <div class="input-group">
                    <input type="text" name="globalAnnouncement" th:value="${config.globalAnnouncement}" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit" style="max-width: 300px; margin: 0 auto;"><i class="fa-solid fa-floppy-disk"></i> Lưu Toàn Bộ Cấu Hình</button>
    </form>
</div>

    <!-- Global SweetAlert wrappers -->
    <script>
        function confirmLink(e, element, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = element.href;
                }
            });
        }

        function confirmForm(e, form, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        }
        
        // Override standard alert to use SweetAlert
        window.originalAlert = window.alert;
        window.alert = function(msg) {
            Swal.fire({
                title: 'Thông báo',
                text: msg,
                icon: msg.toLowerCase().includes('lỗi') || msg.toLowerCase().includes('trống') ? 'error' : 'info',
                confirmButtonText: 'OK'
            });
        };
    </script>

</body>
</html>
