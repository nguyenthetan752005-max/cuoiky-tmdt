<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm - Goodminton Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark, #0b0c10);
            color: var(--text-white, #ffffff);
            min-height: 100vh;
        }

        .admin-content {
            margin-left: 250px;
            padding: 80px 30px 30px 30px;
            min-height: 100vh;
        }

        /* Flash Messages */
        .flash-message {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .flash-success {
            background: rgba(32, 247, 123, 0.15);
            border: 1px solid rgba(32, 247, 123, 0.4);
            color: #20f77b;
        }
        .flash-error {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff4444;
        }

        /* Header Row */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-white, #fff);
        }
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, rgba(69, 243, 255, 0.2), rgba(32, 247, 123, 0.2));
            border: 1px solid var(--primary, #45f3ff);
            color: var(--primary, #45f3ff);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, rgba(69, 243, 255, 0.35), rgba(32, 247, 123, 0.35));
            box-shadow: var(--shadow-neon, 0 0 15px rgba(69, 243, 255, 0.4));
            transform: translateY(-2px);
        }

        /* Table Card */
        .table-card {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(69, 243, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary, #45f3ff);
            background: rgba(69, 243, 255, 0.06);
            border-bottom: 1px solid rgba(69, 243, 255, 0.15);
        }
        .admin-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s ease;
        }
        .admin-table tbody tr:hover {
            background: rgba(69, 243, 255, 0.04);
        }
        .admin-table tbody tr:last-child {
            border-bottom: none;
        }
        .admin-table tbody td {
            padding: 12px 16px;
            font-size: 0.88rem;
            color: var(--text-gray, #c5c6c7);
            vertical-align: middle;
        }
        .admin-table tbody td:first-child {
            color: var(--text-white, #fff);
        }

        /* Product Thumbnail */
        .product-thumb {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Price */
        .price-text {
            color: var(--accent, #20f77b);
            font-weight: 600;
        }

        /* Stock badge */
        .stock-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .stock-low {
            background: rgba(255, 170, 0, 0.15);
            border: 1px solid rgba(255, 170, 0, 0.3);
            color: #ffaa00;
        }
        .stock-ok {
            background: rgba(32, 247, 123, 0.1);
            border: 1px solid rgba(32, 247, 123, 0.25);
            color: #20f77b;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .btn-edit {
            background: rgba(69, 243, 255, 0.12);
            border: 1px solid rgba(69, 243, 255, 0.3);
            color: var(--primary, #45f3ff);
        }
        .btn-edit:hover {
            background: rgba(69, 243, 255, 0.25);
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }
        .btn-delete {
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
        .btn-delete:hover {
            background: rgba(255, 68, 68, 0.25);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray, #c5c6c7);
        }
        .empty-state p {
            font-size: 1rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{admin/layout :: sidebar(currentPage='products')}"></div>

<!-- Topbar -->
<div th:replace="~{admin/layout :: topbar(pageTitle='Quản Lý Sản Phẩm')}"></div>

<!-- Main Content -->
<div class="admin-content">

    <!-- Flash Messages -->
    <div th:if="${success}" class="flash-message flash-success">
        <span>✓</span> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="flash-message flash-error">
        <span>✕</span> <span th:text="${error}"></span>
    </div>

    <!-- Page Header -->
    <div class="page-header">
        <h2>Danh sách sản phẩm</h2>
        <a th:href="@{/admin/products/add}" class="btn-add">+ Thêm sản phẩm</a>
    </div>

    <!-- Search Form -->
    <form th:action="@{/admin/products}" method="get" style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center;">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm sản phẩm theo tên..." 
               style="padding: 10px 14px; border-radius: 8px; background: rgba(31,40,51,0.6); color: #fff; border: 1px solid rgba(69,243,255,0.2); width: 350px; font-family: inherit;">
        <button type="submit" style="padding: 10px 18px; border-radius: 8px; background: rgba(69,243,255,0.1); border: 1px solid var(--primary); color: var(--primary); cursor: pointer; font-weight: 600; transition: all 0.3s;">
            <i class="fa-solid fa-magnifying-glass" style="margin-right: 5px;"></i> Tìm
        </button>
        <a th:if="${keyword != null and !keyword.isEmpty()}" th:href="@{/admin/products}" 
           style="padding: 10px 18px; border-radius: 8px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff4444; text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: all 0.3s;">
           Xóa lọc
        </a>
    </form>

    <!-- Product Table -->
    <div class="table-card">
        <table class="admin-table" th:if="${products != null and !products.isEmpty()}">
            <thead>
                <tr>
                    <th>Ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Giá</th>
                    <th>Tồn kho</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prod : ${products}">
                    <td>
                        <img th:src="${prod.imageUrl}" alt="product" class="product-thumb"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 50 50%22%3E%3Crect fill=%22%231f2833%22 width=%2250%22 height=%2250%22/%3E%3Ctext x=%2225%22 y=%2230%22 text-anchor=%22middle%22 fill=%22%2345f3ff%22 font-size=%2210%22%3ENo img%3C/text%3E%3C/svg%3E'">
                    </td>
                    <td style="color: #fff; font-weight: 500;" th:text="${prod.name}">Tên SP</td>
                    <td th:text="${prod.category != null ? prod.category.name : 'N/A'}">Danh mục</td>
                    <td class="price-text">
                        <span th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </td>
                    <td>
                        <span class="stock-badge"
                              th:classappend="${prod.stockQuantity < 10 ? 'stock-low' : 'stock-ok'}"
                              th:text="${prod.stockQuantity}">0</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/admin/products/edit/{id}(id=${prod.id})}" class="btn-action btn-edit">Sửa</a>
                            <a th:href="@{/admin/products/delete/{id}(id=${prod.id})}"
                               class="btn-action btn-delete"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?');">Xóa</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Empty State -->
        <div th:if="${products == null or products.isEmpty()}" class="empty-state">
            <p>Chưa có sản phẩm nào.</p>
            <a th:href="@{/admin/products/add}" class="btn-add" style="margin-top: 12px; display: inline-flex;">+ Thêm sản phẩm đầu tiên</a>
        </div>
    </div>
</div>

</body>
</html>
