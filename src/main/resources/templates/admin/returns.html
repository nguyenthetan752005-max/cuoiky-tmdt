<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đổi/Trả - Goodminton Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark, #0b0c10);
            color: var(--text-white, #ffffff);
            min-height: 100vh;
        }

        .admin-content {
            margin-left: 250px;
            padding: 80px 30px 30px 30px;
            min-height: 100vh;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 9px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(31, 40, 51, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-gray, #c5c6c7);
            backdrop-filter: blur(10px);
        }
        .filter-tab:hover {
            background: rgba(69, 243, 255, 0.08);
            border-color: rgba(69, 243, 255, 0.2);
            color: var(--primary, #45f3ff);
        }
        .filter-tab.active {
            background: rgba(69, 243, 255, 0.15);
            border-color: var(--primary, #45f3ff);
            color: var(--primary, #45f3ff);
            box-shadow: 0 0 12px rgba(69, 243, 255, 0.15);
        }

        .table-card {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(69, 243, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary, #45f3ff);
            background: rgba(69, 243, 255, 0.06);
            border-bottom: 1px solid rgba(69, 243, 255, 0.15);
            white-space: nowrap;
        }
        .admin-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s ease;
        }
        .admin-table tbody tr:hover {
            background: rgba(69, 243, 255, 0.04);
        }
        .admin-table tbody tr:last-child { border-bottom: none; }
        .admin-table tbody td {
            padding: 12px 16px;
            font-size: 0.88rem;
            color: var(--text-gray, #c5c6c7);
            vertical-align: middle;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .status-PENDING {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.35);
            color: #ffc107;
        }
        .status-APPROVED {
            background: rgba(32, 247, 123, 0.15);
            border: 1px solid rgba(32, 247, 123, 0.35);
            color: #20f77b;
        }
        .status-REJECTED {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.35);
            color: #ff4444;
        }
        .status-COMPLETED {
            background: rgba(69, 243, 255, 0.15);
            border: 1px solid rgba(69, 243, 255, 0.35);
            color: #45f3ff;
        }

        /* Action buttons */
        .btn-action {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            margin: 2px;
        }
        .btn-approve {
            background: rgba(32, 247, 123, 0.15);
            border: 1px solid rgba(32, 247, 123, 0.3);
            color: #20f77b;
        }
        .btn-approve:hover { background: rgba(32, 247, 123, 0.25); }
        .btn-reject {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
        .btn-reject:hover { background: rgba(255, 68, 68, 0.25); }
        .btn-complete {
            background: rgba(69, 243, 255, 0.15);
            border: 1px solid rgba(69, 243, 255, 0.3);
            color: #45f3ff;
        }
        .btn-complete:hover { background: rgba(69, 243, 255, 0.25); }

        .reason-cell {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .order-code {
            font-weight: 600;
            color: var(--text-white, #fff);
            font-family: 'Inter', monospace;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray, #c5c6c7);
        }

        .alert {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .alert-success {
            background: rgba(32, 247, 123, 0.12);
            border: 1px solid rgba(32, 247, 123, 0.3);
            color: #20f77b;
        }
        .alert-error {
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .video-link {
            color: var(--primary, #45f3ff);
            text-decoration: none;
            font-size: 0.82rem;
        }
        .video-link:hover { text-decoration: underline; }
    </style>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* SweetAlert Dark Theme Tweaks to match Goodminton */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #1a222c !important;
            color: #ffffff !important;
            border: 1px solid rgba(69, 243, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm {
            background: #45f3ff !important;
            color: #1a1a2e !important;
            font-weight: 600;
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-cancel {
            background: rgba(255,255,255,0.1) !important;
            color: #fff !important;
        }
    </style>

</head>
<body>

<!-- Sidebar -->
<div th:replace="~{admin/layout :: sidebar(currentPage='returns')}"></div>

<!-- Topbar -->
<div th:replace="~{admin/layout :: topbar(pageTitle='Quản Lý Đổi/Trả Hàng')}"></div>

<!-- Main Content -->
<div class="admin-content">

    <!-- Flash messages -->
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <a th:href="@{/admin/returns}"
           class="filter-tab"
           th:classappend="${selectedStatus == null or selectedStatus == ''} ? 'active' : ''">
            Tất cả
        </a>
        <a th:href="@{/admin/returns(status='PENDING')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'PENDING'} ? 'active' : ''">
            ⏳ Chờ duyệt
        </a>
        <a th:href="@{/admin/returns(status='APPROVED')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'APPROVED'} ? 'active' : ''">
            ✅ Đã duyệt
        </a>
        <a th:href="@{/admin/returns(status='REJECTED')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'REJECTED'} ? 'active' : ''">
            ❌ Từ chối
        </a>
        <a th:href="@{/admin/returns(status='COMPLETED')}"
           class="filter-tab"
           th:classappend="${selectedStatus == 'COMPLETED'} ? 'active' : ''">
            🏁 Hoàn tất
        </a>
    </div>

    <!-- Returns Table -->
    <div class="table-card">
        <table class="admin-table" th:if="${returns != null and !returns.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Mã đơn hàng</th>
                    <th>Khách hàng</th>
                    <th>Lý do</th>
                    <th>Bằng chứng</th>
                    <th>Trạng thái</th>
                    <th>Ngày gửi</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ret : ${returns}">
                    <td th:text="${ret.id}">#1</td>
                    <td>
                        <span class="order-code" th:text="${ret.order.orderCode}">GM-xxx</span>
                    </td>
                    <td th:text="${ret.order.customerName}">Tên KH</td>
                    <td class="reason-cell" th:text="${ret.reason}">Lý do</td>
                    <td>
                        <a th:if="${ret.videoProofUrl != null and !ret.videoProofUrl.isEmpty()}"
                           th:href="${ret.videoProofUrl}" target="_blank" class="video-link">
                            <i class="fa-solid fa-video"></i> Xem
                        </a>
                        <span th:if="${ret.videoProofUrl == null or ret.videoProofUrl.isEmpty()}"
                              style="color: rgba(197,198,199,0.5); font-size: 0.82rem;">Không có</span>
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="'status-' + ${ret.status}"
                              th:text="${ret.status}">PENDING</span>
                    </td>
                    <td style="font-size: 0.82rem; color: rgba(197,198,199,0.7); white-space: nowrap;"
                        th:text="${ret.requestDate != null ? #dates.format(ret.requestDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">01/01/2026</td>
                    <td>
                        <!-- Chỉ hiển thị nút hành động nếu đang ở trạng thái PENDING -->
                        <div th:if="${ret.status == 'PENDING'}" style="display: flex; gap: 4px; flex-wrap: wrap;">
                            <form th:action="@{/admin/returns/{id}/status(id=${ret.id})}" method="post" style="display:inline;">
                                <input type="hidden" name="status" value="APPROVED">
                                <button type="submit" class="btn-action btn-approve">
                                    <i class="fa-solid fa-check"></i> Duyệt
                                </button>
                            </form>
                            <form th:action="@{/admin/returns/{id}/status(id=${ret.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Xác nhận từ chối yêu cầu này?');">
                                <input type="hidden" name="status" value="REJECTED">
                                <button type="submit" class="btn-action btn-reject">
                                    <i class="fa-solid fa-xmark"></i> Từ chối
                                </button>
                            </form>
                        </div>
                        <!-- Nếu đã duyệt (APPROVED), cho phép đánh dấu Hoàn tất -->
                        <div th:if="${ret.status == 'APPROVED'}">
                            <form th:action="@{/admin/returns/{id}/status(id=${ret.id})}" method="post" style="display:inline;">
                                <input type="hidden" name="status" value="COMPLETED">
                                <button type="submit" class="btn-action btn-complete">
                                    <i class="fa-solid fa-flag-checkered"></i> Hoàn tất
                                </button>
                            </form>
                        </div>
                        <span th:if="${ret.status == 'REJECTED' or ret.status == 'COMPLETED'}"
                              style="font-size: 0.82rem; color: rgba(197,198,199,0.5);">Đã xử lý</span>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Empty State -->
        <div th:if="${returns == null or returns.isEmpty()}" class="empty-state">
            <p>Chưa có yêu cầu đổi/trả hàng nào.</p>
        </div>
    </div>
</div>


    <!-- Global SweetAlert wrappers -->
    <script>
        function confirmLink(e, element, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = element.href;
                }
            });
        }

        function confirmForm(e, form, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        }
        
        // Override standard alert to use SweetAlert
        window.originalAlert = window.alert;
        window.alert = function(msg) {
            Swal.fire({
                title: 'Thông báo',
                text: msg,
                icon: msg.toLowerCase().includes('lỗi') || msg.toLowerCase().includes('trống') ? 'error' : 'info',
                confirmButtonText: 'OK'
            });
        };
    </script>

</body>
</html>
