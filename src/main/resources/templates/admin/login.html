<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GOOD MINTON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark, #0b0c10);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .bg-orb--cyan {
            width: 500px;
            height: 500px;
            background: var(--primary, #45f3ff);
            top: -150px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-orb--green {
            width: 400px;
            height: 400px;
            background: var(--accent, #20f77b);
            bottom: -100px;
            left: -100px;
            animation-delay: -4s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(69, 243, 255, 0.15);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                         var(--shadow-neon, 0 0 15px rgba(69, 243, 255, 0.4));
            transition: box-shadow 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                         0 0 30px rgba(69, 243, 255, 0.3);
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 12px;
        }

        .login-logo__icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo__brand {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo__subtitle {
            font-size: 0.85rem;
            color: var(--text-gray, #c5c6c7);
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            border: none;
            border-radius: 2px;
            margin: 24px auto;
        }

        /* Error message */
        .login-error {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff5252;
            font-size: 0.9rem;
            animation: shakeIn 0.4s ease;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .login-error i {
            font-size: 1.1rem;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-gray, #c5c6c7);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray, #c5c6c7);
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(11, 12, 16, 0.6);
            border: 1px solid rgba(69, 243, 255, 0.12);
            border-radius: 12px;
            color: var(--text-white, #ffffff);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(197, 198, 199, 0.4);
        }

        .form-group input:focus {
            border-color: var(--primary, #45f3ff);
            box-shadow: 0 0 0 3px rgba(69, 243, 255, 0.1),
                         inset 0 0 10px rgba(69, 243, 255, 0.05);
        }

        .form-group input:focus + i,
        .form-group .input-wrapper:focus-within i {
            color: var(--primary, #45f3ff);
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--bg-dark, #0b0c10);
            background: linear-gradient(135deg, var(--primary, #45f3ff), var(--accent, #20f77b));
            box-shadow: 0 4px 20px rgba(69, 243, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(69, 243, 255, 0.4);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Back link */
        .login-back {
            text-align: center;
            margin-top: 28px;
        }

        .login-back a {
            color: var(--text-gray, #c5c6c7);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .login-back a:hover {
            color: var(--primary, #45f3ff);
        }
    </style>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* SweetAlert Dark Theme Tweaks to match Goodminton */
        div:where(.swal2-container) div:where(.swal2-popup) {
            background: #1a222c !important;
            color: #ffffff !important;
            border: 1px solid rgba(69, 243, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm {
            background: #45f3ff !important;
            color: #1a1a2e !important;
            font-weight: 600;
        }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-cancel {
            background: rgba(255,255,255,0.1) !important;
            color: #fff !important;
        }
    </style>

</head>
<body>
    <!-- Background orbs -->
    <div class="bg-orb bg-orb--cyan"></div>
    <div class="bg-orb bg-orb--green"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo__icon">
                    <i class="fas fa-shuttlecock"></i>
                </div>
                <div class="login-logo__brand">GOOD MINTON</div>
                <div class="login-logo__subtitle">Admin Panel</div>
            </div>

            <hr class="login-divider">

            <!-- Error message -->
            <div th:if="${error}" class="login-error">
                <i class="fas fa-circle-exclamation"></i>
                <span th:text="${error}">Sai tên đăng nhập hoặc mật khẩu</span>
            </div>

            <!-- Login form -->
            <form th:action="@{/admin/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-right-to-bracket"></i>&nbsp; Đăng nhập
                </button>
            </form>

            <!-- Back to shop -->
            <div class="login-back">
                <a th:href="@{/}">
                    <i class="fas fa-arrow-left"></i>
                    Quay lại cửa hàng
                </a>
            </div>
        </div>
    </div>

    <!-- Global SweetAlert wrappers -->
    <script>
        function confirmLink(e, element, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = element.href;
                }
            });
        }

        function confirmForm(e, form, text) {
            e.preventDefault();
            Swal.fire({
                title: 'Xác nhận',
                text: text,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5252',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        }
        
        // Override standard alert to use SweetAlert
        window.originalAlert = window.alert;
        window.alert = function(msg) {
            Swal.fire({
                title: 'Thông báo',
                text: msg,
                icon: msg.toLowerCase().includes('lỗi') || msg.toLowerCase().includes('trống') ? 'error' : 'info',
                confirmButtonText: 'OK'
            });
        };
    </script>

</body>
</html>
